<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚙️ Derby Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0a0f;
        color: #f0f0f0;
        font-family: 'Barlow', sans-serif;
        min-height: 100vh;
      }
      .font-display {
        font-family: 'Teko', sans-serif;
      }
      .font-condensed {
        font-family: 'Barlow Condensed', sans-serif;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }
      @keyframes checkered-scroll {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 40px 0;
        }
      }
      @keyframes flash-gold {
        0%,
        100% {
          background: #1a1a2e;
        }
        50% {
          background: #2a2000;
        }
      }
      @keyframes spin-slow {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes winner-pop {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        60% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes scanline {
        0% {
          top: -10%;
        }
        100% {
          top: 110%;
        }
      }

      .slide-in {
        animation: slideIn 0.4s ease both;
      }
      .winner-pop {
        animation: winner-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .checkered-bar {
        background-image: repeating-linear-gradient(
          90deg,
          #fff 0px,
          #fff 20px,
          #000 20px,
          #000 40px
        );
        animation: checkered-scroll 1s linear infinite;
      }

      .lane-card {
        transition: all 0.3s ease;
      }
      .armed-pulse {
        animation: pulse-ring 1.2s ease-out infinite;
      }

      .scanline-overlay::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(
          transparent,
          rgba(255, 255, 255, 0.03),
          transparent
        );
        animation: scanline 4s linear infinite;
        pointer-events: none;
      }

      .track-stripe {
        background: repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 18px,
          rgba(255, 255, 255, 0.03) 18px,
          rgba(255, 255, 255, 0.03) 20px
        );
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const LANE_PALETTES = {
        Red: {
          bg: '#1a0808',
          border: '#dc2626',
          text: '#fca5a5',
          glow: 'rgba(220,38,38,0.4)',
          dot: '#ef4444',
        },
        Blue: {
          bg: '#08101a',
          border: '#2563eb',
          text: '#93c5fd',
          glow: 'rgba(37,99,235,0.4)',
          dot: '#3b82f6',
        },
        Yellow: {
          bg: '#1a1608',
          border: '#ca8a04',
          text: '#fde68a',
          glow: 'rgba(202,138,4,0.4)',
          dot: '#eab308',
        },
        Green: {
          bg: '#081a0c',
          border: '#16a34a',
          text: '#86efac',
          glow: 'rgba(22,163,74,0.4)',
          dot: '#22c55e',
        },
        Purple: {
          bg: '#110818',
          border: '#9333ea',
          text: '#d8b4fe',
          glow: 'rgba(147,51,234,0.4)',
          dot: '#a855f7',
        },
        Orange: {
          bg: '#1a0e08',
          border: '#ea580c',
          text: '#fed7aa',
          glow: 'rgba(234,88,12,0.4)',
          dot: '#f97316',
        },
        Pink: {
          bg: '#1a0812',
          border: '#db2777',
          text: '#fbcfe8',
          glow: 'rgba(219,39,119,0.4)',
          dot: '#ec4899',
        },
        White: {
          bg: '#141418',
          border: '#d1d5db',
          text: '#f9fafb',
          glow: 'rgba(209,213,219,0.4)',
          dot: '#e5e7eb',
        },
      }
      const COLOR_NAMES = Object.keys(LANE_PALETTES)
    </script>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React

      const PLACE_LABELS = ['1ST', '2ND', '3RD', '4TH']

      async function api(path, body) {
        const res = await fetch(path, {
          method: body ? 'POST' : 'GET',
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        })
        return res.json()
      }

      function LaneSwatch({ colorName, selected, onClick }) {
        const p = LANE_PALETTES[colorName] || LANE_PALETTES.White
        return (
          <button
            onClick={onClick}
            className="w-8 h-8 rounded-full border-2 transition-all"
            style={{
              background: p.dot,
              borderColor: selected ? '#fff' : 'transparent',
              transform: selected ? 'scale(1.2)' : 'scale(1)',
            }}
            title={colorName}
          />
        )
      }

      function LaneConfig({ lane, currentColor, onSave }) {
        const [editing, setEditing] = useState(false)
        const [selected, setSelected] = useState(currentColor)
        const palette = LANE_PALETTES[currentColor] || LANE_PALETTES.White

        useEffect(() => setSelected(currentColor), [currentColor])

        return (
          <div
            className="rounded-xl border p-3"
            style={{
              borderColor: palette.border + '60',
              background: palette.bg,
            }}
          >
            <div className="flex items-center justify-between mb-2">
              <div>
                <div
                  className="font-condensed text-xs uppercase tracking-widest opacity-40"
                  style={{ color: palette.text }}
                >
                  Lane {lane}
                </div>
                <div
                  className="font-display text-2xl"
                  style={{ color: palette.text }}
                >
                  {currentColor}
                </div>
              </div>
              <div
                className="w-4 h-4 rounded-full"
                style={{ background: palette.dot }}
              />
            </div>
            {editing ? (
              <div>
                <div className="flex gap-2 flex-wrap mb-2">
                  {COLOR_NAMES.map((c) => (
                    <LaneSwatch
                      key={c}
                      colorName={c}
                      selected={selected === c}
                      onClick={() => setSelected(c)}
                    />
                  ))}
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={() => {
                      onSave(lane, selected)
                      setEditing(false)
                    }}
                    className="flex-1 py-1 rounded font-condensed text-xs font-semibold uppercase tracking-wider bg-white/10 hover:bg-white/20 transition"
                  >
                    Save
                  </button>
                  <button
                    onClick={() => setEditing(false)}
                    className="px-3 py-1 rounded font-condensed text-xs uppercase tracking-wider text-white/40 hover:text-white/60 transition"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            ) : (
              <button
                onClick={() => setEditing(true)}
                className="w-full py-1 rounded font-condensed text-xs uppercase tracking-widest transition"
                style={{
                  color: palette.text,
                  opacity: 0.5,
                  background: 'rgba(255,255,255,0.05)',
                }}
              >
                Change Color
              </button>
            )}
          </div>
        )
      }

      function ResultRow({ entry, place, laneColors }) {
        const colorName = laneColors[entry.lane] || 'White'
        const palette = LANE_PALETTES[colorName] || LANE_PALETTES.White
        return (
          <div
            className="flex items-center gap-3 rounded-lg px-3 py-2 border slide-in"
            style={{
              animationDelay: `${place * 0.06}s`,
              background: palette.bg,
              borderColor: palette.border + '80',
            }}
          >
            <div
              className="font-display text-3xl w-14 text-center"
              style={{ color: palette.text }}
            >
              {PLACE_LABELS[place]}
            </div>
            <div
              className="w-px self-stretch opacity-20"
              style={{ background: palette.border }}
            />
            <div className="flex-1">
              <div
                className="font-condensed text-xs opacity-40 uppercase tracking-widest"
                style={{ color: palette.text }}
              >
                Lane {entry.lane}
              </div>
              <div
                className="font-display text-xl"
                style={{ color: palette.text }}
              >
                {colorName}
              </div>
            </div>
            {place > 0 && (
              <div
                className="font-display text-lg opacity-60"
                style={{ color: palette.text }}
              >
                +{entry.gapMs.toFixed(0)}ms
              </div>
            )}
            {place === 0 && <div className="text-xl">🏆</div>}
          </div>
        )
      }

      function StatusBadge({ status }) {
        const map = {
          idle: {
            label: 'IDLE',
            bg: 'bg-white/5',
            text: 'text-white/30',
            dot: 'bg-white/20',
          },
          armed: {
            label: 'ARMED',
            bg: 'bg-green-950',
            text: 'text-green-400',
            dot: 'bg-green-400',
          },
          finished: {
            label: 'FINISHED',
            bg: 'bg-yellow-950',
            text: 'text-yellow-400',
            dot: 'bg-yellow-400',
          },
        }
        const s = map[status] || map.idle
        return (
          <span
            className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-condensed font-semibold uppercase tracking-widest ${s.bg} ${s.text}`}
          >
            <span
              className={`w-1.5 h-1.5 rounded-full ${s.dot} ${status === 'armed' ? 'armed-pulse' : ''}`}
            />
            {s.label}
          </span>
        )
      }

      function App() {
        const [state, setState] = useState(null)
        const [loading, setLoading] = useState('')
        const wsRef = useRef(null)

        useEffect(() => {
          function connect() {
            const ws = new WebSocket(`ws://${location.host}`)
            wsRef.current = ws
            ws.onmessage = (e) => setState(JSON.parse(e.data).state)
            ws.onclose = () => setTimeout(connect, 2000)
          }
          connect()
          return () => wsRef.current?.close()
        }, [])

        if (!state)
          return (
            <div className="flex items-center justify-center min-h-screen">
              <div className="font-display text-2xl text-white/20 tracking-widest">
                CONNECTING…
              </div>
            </div>
          )

        const { finishOrder, laneColors, status, heat, history, numLanes } =
          state

        async function handleArm() {
          setLoading('arm')
          await api('/api/arm', {})
          setLoading('')
        }

        async function handleReset() {
          setLoading('reset')
          await api('/api/reset', {})
          setLoading('')
        }

        async function handleColorSave(lane, color) {
          const colors = { [lane]: color }
          await api('/api/colors', { colors })
        }

        return (
          <div className="min-h-screen flex flex-col">
            {/* Header */}
            <header className="border-b border-white/10 bg-black/60 backdrop-blur px-6 py-4 flex items-center justify-between sticky top-0 z-20">
              <div>
                <div className="font-display text-3xl tracking-widest text-white leading-none">
                  TRACK MANAGER
                </div>
                <div className="font-condensed text-xs tracking-widest uppercase text-white/30">
                  Pinewood Derby Control
                </div>
              </div>
              <div className="flex items-center gap-3">
                <StatusBadge status={status} />
                <div className="font-condensed text-xs text-white/30">
                  Heat{' '}
                  <span className="font-display text-xl text-white">
                    {heat}
                  </span>
                </div>
              </div>
            </header>

            <div className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-0">
              {/* Left: Controls + Lane Config */}
              <div className="lg:col-span-1 border-r border-white/5 p-5 flex flex-col gap-5">
                {/* Controls */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Controls
                  </div>
                  <div className="flex flex-col gap-2">
                    <button
                      onClick={handleArm}
                      disabled={status === 'armed' || loading === 'arm'}
                      className="w-full py-3 rounded-xl font-display text-2xl tracking-widest transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{
                        background:
                          status !== 'armed'
                            ? 'rgba(34,197,94,0.15)'
                            : undefined,
                        border: '1px solid rgba(34,197,94,0.4)',
                        color: '#4ade80',
                      }}
                    >
                      {loading === 'arm' ? 'ARMING…' : '▶  ARM SENSORS'}
                    </button>
                    <button
                      onClick={handleReset}
                      disabled={loading === 'reset'}
                      className="w-full py-3 rounded-xl font-display text-2xl tracking-widest transition-all disabled:opacity-30"
                      style={{
                        background: 'rgba(239,68,68,0.1)',
                        border: '1px solid rgba(239,68,68,0.3)',
                        color: '#f87171',
                      }}
                    >
                      {loading === 'reset' ? 'RESETTING…' : '↺  RESET HEAT'}
                    </button>
                  </div>
                </div>

                {/* Lane Colors */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Lane Colors
                  </div>
                  <div className="flex flex-col gap-2">
                    {Array.from({ length: numLanes }, (_, i) => i + 1).map(
                      (lane) => (
                        <LaneConfig
                          key={lane}
                          lane={lane}
                          currentColor={laneColors[lane] || 'White'}
                          onSave={handleColorSave}
                        />
                      ),
                    )}
                  </div>
                </div>
              </div>

              {/* Right: Results + History */}
              <div className="lg:col-span-2 p-5 flex flex-col gap-5">
                {/* Current heat results */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3 flex items-center gap-2">
                    Current Heat Results
                    {status === 'armed' && (
                      <span className="text-green-500 animate-pulse">
                        ● live
                      </span>
                    )}
                  </div>

                  {finishOrder.length > 0 ? (
                    <div className="flex flex-col gap-2">
                      {finishOrder.map((entry, i) => (
                        <ResultRow
                          key={entry.lane}
                          entry={entry}
                          place={i}
                          laneColors={laneColors}
                        />
                      ))}
                    </div>
                  ) : (
                    <div className="rounded-xl border border-white/5 p-8 text-center">
                      {status === 'armed' ? (
                        <div className="font-display text-xl text-green-500/50 tracking-widest">
                          WAITING FOR CARS…
                        </div>
                      ) : (
                        <div className="font-display text-xl text-white/20 tracking-widest">
                          NO RESULTS YET
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* History */}
                {history.length > 0 && (
                  <div>
                    <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                      Heat History
                    </div>
                    <div className="rounded-xl border border-white/5 overflow-hidden">
                      {history.map((item, idx) => (
                        <div
                          key={item.heat}
                          className={`flex items-center gap-3 px-4 py-2.5 ${idx < history.length - 1 ? 'border-b border-white/5' : ''}`}
                        >
                          <span className="font-condensed text-xs text-white/30 w-14 flex-shrink-0">
                            Heat {item.heat}
                          </span>
                          <div className="flex gap-1.5 flex-wrap flex-1">
                            {item.finishOrder.map((e, i) => {
                              const cn = laneColors[e.lane] || 'White'
                              const p = LANE_PALETTES[cn] || LANE_PALETTES.White
                              return (
                                <span
                                  key={e.lane}
                                  className="font-condensed text-xs px-2 py-0.5 rounded"
                                  style={{
                                    background: p.bg,
                                    color: p.text,
                                    border: `1px solid ${p.border}50`,
                                  }}
                                >
                                  {i + 1}. {cn}
                                </span>
                              )
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
