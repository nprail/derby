<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚙️ Derby Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0a0f;
        color: #f0f0f0;
        font-family: 'Barlow', sans-serif;
        min-height: 100vh;
      }
      .font-display {
        font-family: 'Teko', sans-serif;
      }
      .font-condensed {
        font-family: 'Barlow Condensed', sans-serif;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }
      @keyframes checkered-scroll {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 40px 0;
        }
      }
      @keyframes flash-gold {
        0%,
        100% {
          background: #1a1a2e;
        }
        50% {
          background: #2a2000;
        }
      }
      @keyframes spin-slow {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes winner-pop {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        60% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes scanline {
        0% {
          top: -10%;
        }
        100% {
          top: 110%;
        }
      }

      .slide-in {
        animation: slideIn 0.4s ease both;
      }
      .winner-pop {
        animation: winner-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .checkered-bar {
        background-image: repeating-linear-gradient(
          90deg,
          #fff 0px,
          #fff 20px,
          #000 20px,
          #000 40px
        );
        animation: checkered-scroll 1s linear infinite;
      }

      .lane-card {
        transition: all 0.3s ease;
      }
      .armed-pulse {
        animation: pulse-ring 1.2s ease-out infinite;
      }

      .scanline-overlay::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(
          transparent,
          rgba(255, 255, 255, 0.03),
          transparent
        );
        animation: scanline 4s linear infinite;
        pointer-events: none;
      }

      .track-stripe {
        background: repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 18px,
          rgba(255, 255, 255, 0.03) 18px,
          rgba(255, 255, 255, 0.03) 20px
        );
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const LANE_PALETTES = {
        Red: {
          bg: '#1a0808',
          border: '#dc2626',
          text: '#fca5a5',
          glow: 'rgba(220,38,38,0.4)',
          dot: '#ef4444',
        },
        Blue: {
          bg: '#08101a',
          border: '#2563eb',
          text: '#93c5fd',
          glow: 'rgba(37,99,235,0.4)',
          dot: '#3b82f6',
        },
        Yellow: {
          bg: '#1a1608',
          border: '#ca8a04',
          text: '#fde68a',
          glow: 'rgba(202,138,4,0.4)',
          dot: '#eab308',
        },
        Green: {
          bg: '#081a0c',
          border: '#16a34a',
          text: '#86efac',
          glow: 'rgba(22,163,74,0.4)',
          dot: '#22c55e',
        },
        Purple: {
          bg: '#110818',
          border: '#9333ea',
          text: '#d8b4fe',
          glow: 'rgba(147,51,234,0.4)',
          dot: '#a855f7',
        },
        Orange: {
          bg: '#1a0e08',
          border: '#ea580c',
          text: '#fed7aa',
          glow: 'rgba(234,88,12,0.4)',
          dot: '#f97316',
        },
        Pink: {
          bg: '#1a0812',
          border: '#db2777',
          text: '#fbcfe8',
          glow: 'rgba(219,39,119,0.4)',
          dot: '#ec4899',
        },
        White: {
          bg: '#141418',
          border: '#d1d5db',
          text: '#f9fafb',
          glow: 'rgba(209,213,219,0.4)',
          dot: '#e5e7eb',
        },
      }
      const COLOR_NAMES = Object.keys(LANE_PALETTES)
    </script>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React

      const PLACE_LABELS = ['1ST', '2ND', '3RD', '4TH']

      async function api(path, body) {
        const res = await fetch(path, {
          method: body ? 'POST' : 'GET',
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        })
        return res.json()
      }

      function LaneSwatch({ colorName, selected, onClick }) {
        const p = LANE_PALETTES[colorName] || LANE_PALETTES.White
        return (
          <button
            onClick={onClick}
            className="w-8 h-8 rounded-full border-2 transition-all"
            style={{
              background: p.dot,
              borderColor: selected ? '#fff' : 'transparent',
              transform: selected ? 'scale(1.2)' : 'scale(1)',
            }}
            title={colorName}
          />
        )
      }

      function LaneConfig({ lane, currentColor, onSave }) {
        const [editing, setEditing] = useState(false)
        const [selected, setSelected] = useState(currentColor)
        const palette = LANE_PALETTES[currentColor] || LANE_PALETTES.White

        useEffect(() => setSelected(currentColor), [currentColor])

        return (
          <div
            className="rounded-xl border p-3"
            style={{
              borderColor: palette.border + '60',
              background: palette.bg,
            }}
          >
            <div className="flex items-center justify-between mb-2">
              <div>
                <div
                  className="font-condensed text-xs uppercase tracking-widest opacity-40"
                  style={{ color: palette.text }}
                >
                  Lane {lane}
                </div>
                <div
                  className="font-display text-2xl"
                  style={{ color: palette.text }}
                >
                  {currentColor}
                </div>
              </div>
              <div
                className="w-4 h-4 rounded-full"
                style={{ background: palette.dot }}
              />
            </div>
            {editing ? (
              <div>
                <div className="flex gap-2 flex-wrap mb-2">
                  {COLOR_NAMES.map((c) => (
                    <LaneSwatch
                      key={c}
                      colorName={c}
                      selected={selected === c}
                      onClick={() => setSelected(c)}
                    />
                  ))}
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={() => {
                      onSave(lane, selected)
                      setEditing(false)
                    }}
                    className="flex-1 py-1 rounded font-condensed text-xs font-semibold uppercase tracking-wider bg-white/10 hover:bg-white/20 transition"
                  >
                    Save
                  </button>
                  <button
                    onClick={() => setEditing(false)}
                    className="px-3 py-1 rounded font-condensed text-xs uppercase tracking-wider text-white/40 hover:text-white/60 transition"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            ) : (
              <button
                onClick={() => setEditing(true)}
                className="w-full py-1 rounded font-condensed text-xs uppercase tracking-widest transition"
                style={{
                  color: palette.text,
                  opacity: 0.5,
                  background: 'rgba(255,255,255,0.05)',
                }}
              >
                Change Color
              </button>
            )}
          </div>
        )
      }

      function SensorConfig({ sensorMode }) {
        const [saving, setSaving] = React.useState(false)
        const modes = [
          { id: 'gpio', label: 'GPIO', desc: 'Raspberry Pi pigpio' },
          { id: 'esp32', label: 'ESP32', desc: 'WiFi sensor node' },
          { id: 'simulate', label: 'Simulate', desc: 'Simulated race' },
        ]

        async function handleSelect(mode) {
          if (mode === sensorMode || saving) return
          setSaving(true)
          try {
            await api('/api/settings', { sensorMode: mode })
          } catch (err) {
            console.error('Failed to change sensor mode:', err)
          } finally {
            setSaving(false)
          }
        }

        return (
          <div className="flex flex-col gap-1.5">
            {modes.map(({ id, label, desc }) => (
              <button
                key={id}
                onClick={() => handleSelect(id)}
                disabled={saving}
                className="w-full flex items-center justify-between px-4 py-3 rounded-xl border transition-all disabled:opacity-30"
                style={{
                  background:
                    sensorMode === id
                      ? 'rgba(99,102,241,0.12)'
                      : 'rgba(255,255,255,0.03)',
                  borderColor:
                    sensorMode === id
                      ? 'rgba(99,102,241,0.5)'
                      : 'rgba(255,255,255,0.1)',
                }}
              >
                <div className="text-left">
                  <div
                    className="font-condensed text-sm font-semibold uppercase tracking-widest"
                    style={{
                      color:
                        sensorMode === id ? '#a5b4fc' : 'rgba(255,255,255,0.3)',
                    }}
                  >
                    {label}
                  </div>
                  <div className="font-condensed text-xs text-white/20 mt-0.5">
                    {desc}
                  </div>
                </div>
                {sensorMode === id && (
                  <span className="w-2 h-2 rounded-full bg-indigo-400 flex-shrink-0" />
                )}
              </button>
            ))}
          </div>
        )
      }

      function LaneCountConfig({ numLanes }) {
        const [saving, setSaving] = React.useState(false)
        const options = [2, 3, 4, 5, 6]

        async function handleSelect(n) {
          if (n === numLanes || saving) return
          setSaving(true)
          try {
            await api('/api/settings', { numLanes: n })
          } catch (err) {
            console.error('Failed to change lane count:', err)
          } finally {
            setSaving(false)
          }
        }

        return (
          <div className="flex gap-2">
            {options.map((n) => (
              <button
                key={n}
                onClick={() => handleSelect(n)}
                disabled={saving}
                className="flex-1 py-2 rounded-xl border font-display text-xl tracking-widest transition-all disabled:opacity-30"
                style={{
                  background: numLanes === n ? 'rgba(99,102,241,0.12)' : 'rgba(255,255,255,0.03)',
                  borderColor: numLanes === n ? 'rgba(99,102,241,0.5)' : 'rgba(255,255,255,0.1)',
                  color: numLanes === n ? '#a5b4fc' : 'rgba(255,255,255,0.3)',
                }}
              >
                {n}
              </button>
            ))}
          </div>
        )
      }

      function TimeoutConfig({ timeout }) {
        const [saving, setSaving] = React.useState(false)
        const options = [5, 8, 10, 15, 20]

        async function handleSelect(t) {
          if (t === timeout || saving) return
          setSaving(true)
          try {
            await api('/api/settings', { timeout: t })
          } catch (err) {
            console.error('Failed to change timeout:', err)
          } finally {
            setSaving(false)
          }
        }

        return (
          <div className="flex gap-2">
            {options.map((t) => (
              <button
                key={t}
                onClick={() => handleSelect(t)}
                disabled={saving}
                className="flex-1 py-2 rounded-xl border font-display text-xl tracking-widest transition-all disabled:opacity-30"
                style={{
                  background: timeout === t ? 'rgba(99,102,241,0.12)' : 'rgba(255,255,255,0.03)',
                  borderColor: timeout === t ? 'rgba(99,102,241,0.5)' : 'rgba(255,255,255,0.1)',
                  color: timeout === t ? '#a5b4fc' : 'rgba(255,255,255,0.3)',
                }}
              >
                {t}
              </button>
            ))}
          </div>
        )
      }

      function ZCamConfig({ zcamEnabled, zcamIp }) {
        const [ip, setIp] = React.useState(zcamIp || '')
        const [saving, setSaving] = React.useState(false)

        React.useEffect(() => setIp(zcamIp || ''), [zcamIp])

        async function handleSave() {
          setSaving(true)
          await api('/api/settings', { zcamIp: ip.trim() || null })
          setSaving(false)
        }

        async function handleDisable() {
          setSaving(true)
          await api('/api/settings', { zcamIp: null })
          setIp('')
          setSaving(false)
        }

        return (
          <div className="mb-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="font-condensed text-xs font-semibold uppercase tracking-wider text-white/50">
                ZCam IP
              </span>
              {zcamEnabled && (
                <span className="font-condensed text-xs text-green-400">● active</span>
              )}
            </div>
            <div className="flex gap-2">
              <input
                type="text"
                value={ip}
                onChange={(e) => setIp(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleSave()}
                placeholder="e.g. 10.98.32.1"
                className="flex-1 min-w-0 px-3 py-2 rounded-lg font-condensed text-sm bg-white/5 border border-white/10 text-white placeholder-white/20 focus:outline-none focus:border-white/30"
              />
              <button
                onClick={handleSave}
                disabled={saving}
                className="px-4 py-2 rounded-lg font-condensed text-xs uppercase tracking-wider border transition disabled:opacity-30"
                style={{
                  background: 'rgba(99,102,241,0.2)',
                  borderColor: 'rgba(99,102,241,0.4)',
                  color: '#a5b4fc',
                }}
              >
                {saving ? '…' : 'Save'}
              </button>
            </div>
            {zcamEnabled && (
              <button
                onClick={handleDisable}
                disabled={saving}
                className="mt-1.5 w-full py-1 rounded font-condensed text-xs uppercase tracking-wider text-white/25 hover:text-red-400 transition disabled:opacity-30"
              >
                Disable ZCam
              </button>
            )}
          </div>
        )
      }

      function ResultRow({ entry, place, laneColors }) {
        const colorName = laneColors[entry.lane] || 'White'
        const palette = LANE_PALETTES[colorName] || LANE_PALETTES.White
        return (
          <div
            className="flex items-center gap-3 rounded-lg px-3 py-2 border slide-in"
            style={{
              animationDelay: `${place * 0.06}s`,
              background: palette.bg,
              borderColor: palette.border + '80',
            }}
          >
            <div
              className="font-display text-3xl w-14 text-center"
              style={{ color: palette.text }}
            >
              {PLACE_LABELS[place]}
            </div>
            <div
              className="w-px self-stretch opacity-20"
              style={{ background: palette.border }}
            />
            <div className="flex-1">
              <div
                className="font-condensed text-xs opacity-40 uppercase tracking-widest"
                style={{ color: palette.text }}
              >
                Lane {entry.lane}
              </div>
              <div
                className="font-display text-xl"
                style={{ color: palette.text }}
              >
                {colorName}
              </div>
            </div>
            {place > 0 && (
              <div
                className="font-display text-lg opacity-60"
                style={{ color: palette.text }}
              >
                +{entry.gapMs.toFixed(0)}ms
              </div>
            )}
            {place === 0 && <div className="text-xl">🏆</div>}
          </div>
        )
      }

      function RacingLaneRow({ lane, laneColors }) {
        const colorName = laneColors[lane] || 'White'
        const palette = LANE_PALETTES[colorName] || LANE_PALETTES.White
        return (
          <div
            className="flex items-center gap-3 rounded-lg px-3 py-2 border"
            style={{
              background: palette.bg,
              borderColor: palette.border + '30',
              opacity: 0.5,
            }}
          >
            <div
              className="font-display text-3xl w-14 text-center"
              style={{ color: palette.text, opacity: 0.2 }}
            >
              —
            </div>
            <div
              className="w-px self-stretch opacity-20"
              style={{ background: palette.border }}
            />
            <div className="flex-1">
              <div
                className="font-condensed text-xs opacity-40 uppercase tracking-widest"
                style={{ color: palette.text }}
              >
                Lane {lane}
              </div>
              <div
                className="font-display text-xl"
                style={{ color: palette.text }}
              >
                {colorName}
              </div>
            </div>
            <div className="font-condensed text-xs tracking-widest uppercase text-green-500 animate-pulse">
              racing
            </div>
          </div>
        )
      }

      function StatusBadge({ status }) {
        const map = {
          idle: {
            label: 'IDLE',
            bg: 'bg-white/5',
            text: 'text-white/30',
            dot: 'bg-white/20',
          },
          armed: {
            label: 'ARMED',
            bg: 'bg-green-950',
            text: 'text-green-400',
            dot: 'bg-green-400',
          },
          finished: {
            label: 'FINISHED',
            bg: 'bg-yellow-950',
            text: 'text-yellow-400',
            dot: 'bg-yellow-400',
          },
        }
        const s = map[status] || map.idle
        return (
          <span
            className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-condensed font-semibold uppercase tracking-widest ${s.bg} ${s.text}`}
          >
            <span
              className={`w-1.5 h-1.5 rounded-full ${s.dot} ${status === 'armed' ? 'armed-pulse' : ''}`}
            />
            {s.label}
          </span>
        )
      }

      function SettingsModal({ state, onClose }) {
        const { numLanes, laneColors, sensorMode, zcamEnabled, zcamIp, videoReplayEnabled, timeout } = state

        async function handleColorSave(lane, color) {
          await api('/api/settings', { colors: { [lane]: color } })
        }

        async function handleToggleVideoReplay() {
          await api('/api/settings', { videoReplayEnabled: !videoReplayEnabled })
        }

        return (
          <div className="fixed inset-0 z-50 flex">
            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={onClose} />
            <div className="relative ml-auto w-full max-w-sm flex flex-col bg-[#0e0e14] border-l border-white/10 overflow-y-auto">
              <div className="sticky top-0 bg-[#0e0e14] border-b border-white/5 px-5 py-4 flex items-center justify-between z-10">
                <div className="font-display text-2xl tracking-widest">SETTINGS</div>
                <button
                  onClick={onClose}
                  className="w-8 h-8 flex items-center justify-center rounded-lg text-white/30 hover:text-white hover:bg-white/10 transition font-condensed text-lg"
                >
                  ✕
                </button>
              </div>
              <div className="flex flex-col gap-5 p-5">
                {/* Sensor Mode */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Sensor Mode
                  </div>
                  <SensorConfig sensorMode={sensorMode} />
                </div>

                {/* Camera */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Camera
                  </div>
                  <ZCamConfig zcamEnabled={zcamEnabled} zcamIp={zcamIp} />
                  {zcamEnabled && (
                    <button
                      onClick={handleToggleVideoReplay}
                      className="w-full flex items-center justify-between px-4 py-3 rounded-xl border transition-all"
                      style={{
                        background: videoReplayEnabled ? 'rgba(99,102,241,0.12)' : 'rgba(255,255,255,0.03)',
                        borderColor: videoReplayEnabled ? 'rgba(99,102,241,0.5)' : 'rgba(255,255,255,0.1)',
                      }}
                    >
                      <div className="text-left">
                        <div
                          className="font-condensed text-sm font-semibold uppercase tracking-widest"
                          style={{ color: videoReplayEnabled ? '#a5b4fc' : 'rgba(255,255,255,0.3)' }}
                        >
                          Video Replay
                        </div>
                        <div className="font-condensed text-xs text-white/20 mt-0.5">
                          Show heat recording on guest display
                        </div>
                      </div>
                      <div
                        className="relative flex-shrink-0 w-11 h-6 rounded-full transition-colors duration-200"
                        style={{ background: videoReplayEnabled ? '#6366f1' : 'rgba(255,255,255,0.1)' }}
                      >
                        <div
                          className="absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all duration-200"
                          style={{ left: videoReplayEnabled ? '22px' : '2px' }}
                        />
                      </div>
                    </button>
                  )}
                </div>

                {/* Timeout */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Heat Timeout (seconds)
                  </div>
                  <TimeoutConfig timeout={timeout} />
                </div>

                {/* Lane Count */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Lane Count
                  </div>
                  <LaneCountConfig numLanes={numLanes} />
                </div>

                {/* Lane Colors */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Lane Colors
                  </div>
                  <div className="flex flex-col gap-2">
                    {Array.from({ length: numLanes }, (_, i) => i + 1).map((lane) => (
                      <LaneConfig
                        key={lane}
                        lane={lane}
                        currentColor={laneColors[lane] || 'White'}
                        onSave={handleColorSave}
                      />
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        )
      }

      function App() {
        const [state, setState] = useState(null)
        const [loading, setLoading] = useState('')
        const [settingsOpen, setSettingsOpen] = useState(false)
        const wsRef = useRef(null)

        useEffect(() => {
          function connect() {
            const ws = new WebSocket(`ws://${location.host}`)
            wsRef.current = ws
            ws.onmessage = (e) => setState(JSON.parse(e.data).state)
            ws.onclose = () => setTimeout(connect, 2000)
          }
          connect()
          return () => wsRef.current?.close()
        }, [])

        if (!state)
          return (
            <div className="flex items-center justify-center min-h-screen">
              <div className="font-display text-2xl text-white/20 tracking-widest">
                CONNECTING…
              </div>
            </div>
          )

        const { finishOrder, laneColors, status, heat, history, numLanes } = state

        async function handleArm() {
          setLoading('arm')
          await api('/api/arm', {})
          setLoading('')
        }

        async function handleReset() {
          if (
            !confirm(
              'Re-run this heat? The current results will not be counted and the heat number will not advance.',
            )
          )
            return
          setLoading('reset')
          await api('/api/reset', {})
          setLoading('')
        }

        async function handleResetRace() {
          if (
            !confirm(
              'Reset the entire race? This will clear all history and return to Heat 1.',
            )
          )
            return
          setLoading('reset-race')
          await api('/api/reset-race', {})
          setLoading('')
        }

        async function handleClearDisplay() {
          setLoading('clear')
          await api('/api/clear-display', {})
          setLoading('')
        }

        return (
          <div className="min-h-screen flex flex-col">
            {/* Header */}
            <header className="border-b border-white/10 bg-black/60 backdrop-blur px-6 py-4 flex items-center justify-between sticky top-0 z-20">
              <div>
                <div className="font-display text-3xl tracking-widest text-white leading-none">
                  TRACK MANAGER
                </div>
                <div className="font-condensed text-xs tracking-widest uppercase text-white/30">
                  Pinewood Derby Control
                </div>
              </div>
              <div className="flex items-center gap-3">
                <StatusBadge status={status} />
                <div className="font-condensed text-xs text-white/30">
                  Heat{' '}
                  <span className="font-display text-xl text-white">
                    {heat}
                  </span>
                </div>
                <a
                  href="/judge"
                  className="h-9 flex items-center px-3 rounded-lg border border-white/10 font-condensed text-xs uppercase tracking-widest text-white/40 hover:text-white hover:border-white/30 hover:bg-white/5 transition"
                  title="Judge Assist"
                >
                  🏁 Judge
                </a>
                <button
                  onClick={() => setSettingsOpen(true)}
                  className="w-9 h-9 flex items-center justify-center rounded-lg border border-white/10 text-white/40 hover:text-white hover:border-white/30 hover:bg-white/5 transition"
                  title="Settings"
                >
                  ⚙
                </button>
              </div>
            </header>

            {settingsOpen && <SettingsModal state={state} onClose={() => setSettingsOpen(false)} />}
            <div className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-0">
              {/* Left: Controls + Lane Config */}
              <div className="lg:col-span-1 border-r border-white/5 p-5 flex flex-col gap-5">
                {/* Controls */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                    Controls
                  </div>
                  <div className="flex flex-col gap-2">
                    <button
                      onClick={handleArm}
                      disabled={status === 'armed' || loading === 'arm'}
                      className="w-full py-3 rounded-xl font-display text-2xl tracking-widest transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{
                        background:
                          status !== 'armed'
                            ? 'rgba(34,197,94,0.15)'
                            : undefined,
                        border: '1px solid rgba(34,197,94,0.4)',
                        color: '#4ade80',
                      }}
                    >
                      {loading === 'arm' ? 'ARMING…' : '▶  ARM SENSORS'}
                    </button>
                    <button
                      onClick={handleReset}
                      disabled={loading === 'reset'}
                      className="w-full py-3 rounded-xl font-display text-2xl tracking-widest transition-all disabled:opacity-30"
                      style={{
                        background: 'rgba(239,68,68,0.1)',
                        border: '1px solid rgba(239,68,68,0.3)',
                        color: '#f87171',
                      }}
                    >
                      {loading === 'reset' ? 'RESETTING…' : '↺  RESET HEAT'}
                    </button>
                    <button
                      onClick={handleClearDisplay}
                      disabled={status !== 'finished' || loading === 'clear'}
                      className="w-full py-3 rounded-xl font-display text-2xl tracking-widest transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{
                        background: 'rgba(99,102,241,0.1)',
                        border: '1px solid rgba(99,102,241,0.3)',
                        color: '#a5b4fc',
                      }}
                    >
                      {loading === 'clear' ? 'CLEARING…' : '✕  CLEAR DISPLAY'}
                    </button>
                    <button
                      onClick={handleResetRace}
                      disabled={loading === 'reset-race'}
                      className="w-full py-1.5 rounded-lg font-condensed text-xs uppercase tracking-widest transition-all disabled:opacity-30"
                      style={{
                        background: 'rgba(239,68,68,0.05)',
                        border: '1px solid rgba(239,68,68,0.2)',
                        color: '#f87171',
                        opacity: loading === 'reset-race' ? 0.3 : 0.6,
                      }}
                    >
                      {loading === 'reset-race'
                        ? 'Resetting…'
                        : '⚠ Reset Entire Race'}
                    </button>
                  </div>
                </div>
              </div>

              {/* Right: Results + History */}
              <div className="lg:col-span-2 p-5 flex flex-col gap-5">
                {/* Current heat results */}
                <div>
                  <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3 flex items-center gap-2">
                    Current Heat Results
                    {status === 'armed' && (
                      <span className="text-green-500 animate-pulse">
                        ● live
                      </span>
                    )}
                  </div>

                  {status === 'armed' ? (
                    <div className="flex flex-col gap-2">
                      {finishOrder.map((entry, i) => (
                        <ResultRow
                          key={`f-${entry.lane}`}
                          entry={entry}
                          place={i}
                          laneColors={laneColors}
                        />
                      ))}
                      {Array.from({ length: numLanes }, (_, i) => i + 1)
                        .filter(
                          (lane) => !finishOrder.some((e) => e.lane === lane),
                        )
                        .map((lane) => (
                          <RacingLaneRow
                            key={`r-${lane}`}
                            lane={lane}
                            laneColors={laneColors}
                          />
                        ))}
                    </div>
                  ) : finishOrder.length > 0 ? (
                    <div className="flex flex-col gap-2">
                      {finishOrder.map((entry, i) => (
                        <ResultRow
                          key={entry.lane}
                          entry={entry}
                          place={i}
                          laneColors={laneColors}
                        />
                      ))}
                    </div>
                  ) : (
                    <div className="rounded-xl border border-white/5 p-8 text-center">
                      <div className="font-display text-xl text-white/20 tracking-widest">
                        NO RESULTS YET
                      </div>
                    </div>
                  )}
                </div>

                {/* History */}
                {history.length > 0 && (
                  <div>
                    <div className="font-condensed text-xs uppercase tracking-widest text-white/30 mb-3">
                      Heat History
                    </div>
                    <div className="rounded-xl border border-white/5 overflow-hidden">
                      {history.map((item, idx) => (
                        <div
                          key={item.heat}
                          className={`flex items-center gap-3 px-4 py-2.5 ${idx < history.length - 1 ? 'border-b border-white/5' : ''}`}
                        >
                          <span className="font-condensed text-xs text-white/30 w-14 flex-shrink-0">
                            Heat {item.heat}
                          </span>
                          <div className="flex gap-1.5 flex-wrap flex-1">
                            {item.finishOrder.map((e, i) => {
                              const cn = laneColors[e.lane] || 'White'
                              const p = LANE_PALETTES[cn] || LANE_PALETTES.White
                              return (
                                <span
                                  key={e.lane}
                                  className="font-condensed text-xs px-2 py-0.5 rounded"
                                  style={{
                                    background: p.bg,
                                    color: p.text,
                                    border: `1px solid ${p.border}50`,
                                  }}
                                >
                                  {i + 1}. {cn}
                                </span>
                              )
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
