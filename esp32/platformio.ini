; PlatformIO project configuration for the Derby ESP32 Sensor Node
; Install PlatformIO: https://platformio.org/install

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Adjust upload_port to match your serial port, e.g.:
;   macOS:   /dev/cu.usbserial-*
;   Linux:   /dev/ttyUSB0
;   Windows: COM3
; Leave blank to let PlatformIO auto-detect.
; upload_port = /dev/cu.usbserial-0001

monitor_speed = 115200

lib_deps =
    ; JSON builder / parser
    bblanchon/ArduinoJson @ ^6.21.5
